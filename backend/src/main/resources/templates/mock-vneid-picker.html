<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VNeID Mô Phỏng</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f3ef; padding: 32px 16px; margin: 0; color: #2a2a2a; }
        .card { max-width: 560px; margin: 0 auto; background: #fff; padding: 28px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        h1 { color: #8B1C1C; margin: 0 0 4px 0; font-size: 22px; }
        .subtitle { color: #777; margin: 0 0 22px 0; font-size: 14px; }
        .identity-list { display: flex; flex-direction: column; gap: 8px; }
        .identity { display: block; padding: 14px 16px; border: 1px solid #e2e2e2; border-radius: 8px; text-decoration: none; color: inherit; background: #fff; transition: all 0.15s ease; }
        .identity:hover { border-color: #D9A441; background: #fffaf0; transform: translateY(-1px); }
        .name { font-weight: 600; color: #8B1C1C; font-size: 15px; }
        .meta { font-size: 12px; color: #888; margin-top: 4px; }
        .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
        .badge-citizen { background: #eef3ff; color: #2a5bd7; }
        .badge-org { background: #fbeee0; color: #b3641a; }
        .foot { margin-top: 20px; font-size: 11px; color: #999; text-align: center; }
    </style>
</head>
<body>
<div class="card">
    <h1>VNeID Mô Phỏng</h1>
    <p class="subtitle">Chọn một tài khoản định danh (công dân hoặc tổ chức) để đăng nhập.</p>
    <div class="identity-list">
        <a th:each="u : ${identities}"
           class="identity"
           th:href="@{/api/auth/mock-vneid/callback(user_id=${u.id}, redirect_uri=${redirectUri}, state=${state})}">
            <div class="name">
                <span th:text="${u.fullName}">Họ và tên</span>
                <span th:if="${u.organization}" class="badge badge-org">Tổ chức</span>
                <span th:unless="${u.organization}" class="badge badge-citizen">Công dân</span>
            </div>
            <div class="meta" th:if="${u.organization}">
                Mã số thuế: <span th:text="${u.citizenId}">...</span>
            </div>
            <div class="meta" th:unless="${u.organization}">
                CCCD: <span th:text="${u.citizenId}">...</span> •
                Ngày sinh: <span th:text="${u.dob}">...</span>
            </div>
        </a>
    </div>
    <div class="foot">Đây là trang mô phỏng phục vụ mục đích demo. Không phải VNeID thật.</div>
</div>
</body>
</html>
