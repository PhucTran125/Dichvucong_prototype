spring:
  application:
    name: document-search
  datasource:
    # SID-style URL (matches the provided hibernate.connection.url). For a service
    # name instead of a SID use: jdbc:oracle:thin:@//host:port/SERVICE_NAME
    url: "${ORACLE_URL:jdbc:oracle:thin:@localhost:1535:DBDaotao}"
    driver-class-name: oracle.jdbc.OracleDriver
    username: "${ORACLE_USER:LLTP}"
    password: "${ORACLE_PASSWORD:LLTP#123}"

  jpa:
    # Hibernate auto-detects the running Oracle version over the connection.
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none          # schema is owned by schema-oracle.sql, not Hibernate
    # Oracle owns its schema via schema-oracle.sql; keep scripts running as before (no defer).
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        # Store java.util.UUID as the 36-char string form (VARCHAR2(36)) instead of
        # the Oracle default RAW(16), so the string UUIDs in data.sql line up.
        type:
          preferred_uuid_jdbc_type: CHAR

  sql:
    init:
      # First boot: the DROP TABLE statements fail because the tables don't exist yet.
      # continue-on-error lets startup proceed; subsequent boots drop+recreate cleanly.
      continue-on-error: true
      schema-locations: classpath:schema-oracle.sql
      data-locations: classpath:data.sql
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: ${PORT:8082}

app:
  # Override via env var on Render: PUBLIC_BASE_URL=https://your-service.onrender.com
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:4200}
  jwt:
    # Override via env var in prod: JWT_SECRET=<random 32+ bytes>
    secret: ${JWT_SECRET:this-is-a-prototype-secret-at-least-32-bytes-long-please-change}
    ttl-minutes: 120
  export-qr: false
  officer:
    # Mock cán bộ (official) login for the LLTP verification gate. Config-only — NO database row.
    # Override the username/password via env vars in prod.
    username: ${LLTP_OFFICER_USERNAME:canbo}
    password: ${LLTP_OFFICER_PASSWORD:123456}
    id: 44444444-4444-4444-4444-000000000001
    full-name: Cán bộ Sở Tư pháp
    citizen-id: "000000000099"
    address: Sở Tư pháp Hà Nội
    dob: 1985-01-01
  lltp:
    # Secret for deriving the certificate auth code (mã xác thực) + QR signature. Override in prod.
    code-secret: ${LLTP_CODE_SECRET:lltp-prototype-code-secret-change-me}
    # Dev convenience: GET /api/lltp/_demo/codes lists seeded certs + their auth codes. Disable in prod.
    expose-codes: ${LLTP_EXPOSE_CODES:true}

logging:
  level:
    root: INFO
    com.viettel.docsearch: DEBUG
