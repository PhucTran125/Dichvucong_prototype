spring:
  application:
    name: document-search
  datasource:
    url: jdbc:h2:mem:docsearch;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  sql:
    init:
      mode: always
      continue-on-error: false
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: ${PORT:8080}

app:
  # Override via env var on Render: PUBLIC_BASE_URL=https://your-service.onrender.com
  public-base-url: ${PUBLIC_BASE_URL:http://localhost:4200}
  jwt:
    # Override via env var in prod: JWT_SECRET=<random 32+ bytes>
    secret: ${JWT_SECRET:this-is-a-prototype-secret-at-least-32-bytes-long-please-change}
    ttl-minutes: 120
  export-qr: false

logging:
  level:
    root: INFO
    com.viettel.docsearch: DEBUG
