services:
  - type: web
    name: document-search
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/documents/search?size=1
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false            # set in the Render dashboard after first deploy
      - key: JWT_SECRET
        generateValue: true    # Render generates a random 32+ byte value
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:MaxRAMPercentage=75"
